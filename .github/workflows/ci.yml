name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: mysecretpassword
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:mysecretpassword@127.0.0.1:5432/postgres?schema=public
      NEXTAUTH_SECRET: ci-nextauth-secret
      COLLAB_TOKEN_SECRET: ci-collab-secret
      NEXT_PUBLIC_COLLAB_URL: ws://127.0.0.1:1234
      COLLAB_HTTP_URL: http://127.0.0.1:1234
      COLLAB_PORT: "1234"
      COLLAB_STORE_DEBOUNCE_MS: "1200"
      COLLAB_STORE_MAX_DEBOUNCE_MS: "5000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply Prisma migrations
        run: bunx prisma migrate deploy
        working-directory: packages/db

      - name: Check types
        run: bun run check-types

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

  e2e:
    runs-on: ubuntu-latest
    needs: checks
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: mysecretpassword
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:mysecretpassword@127.0.0.1:5432/postgres?schema=public
      NEXTAUTH_SECRET: ci-nextauth-secret
      COLLAB_TOKEN_SECRET: ci-collab-secret
      NEXT_PUBLIC_COLLAB_URL: ws://127.0.0.1:1234
      COLLAB_HTTP_URL: http://127.0.0.1:1234
      COLLAB_PORT: "1234"
      COLLAB_STORE_DEBOUNCE_MS: "1200"
      COLLAB_STORE_MAX_DEBOUNCE_MS: "5000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply Prisma migrations
        run: bunx prisma migrate deploy
        working-directory: packages/db

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run end-to-end tests
        run: bun run test:e2e
        working-directory: apps/web
